<!DOCTYPE html>
<html>
<head>
<title>Life Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<div class="card center">

<h1 id="clock"></h1>
<p id="date"></p>
<h2 id="greeting"></h2>

</div>

<div class="grid">

<div class="card center">

<h3>Focus Timer</h3>

<div id="timer">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h3>Tasks</h3>

<input id="taskInput" placeholder="Add a new task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

</div>

<div class="card quick-links center">

<h3>Quick Links</h3>

<button onclick="openSite('https://google.com')">Google</button>
<button onclick="openSite('https://youtube.com')">YouTube</button>
<button onclick="openSite('https://github.com')">GitHub</button>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
